# wrangler.toml — GTI Dashboard Monitor v3.0 (Cloudflare Worker)
# Documentação: https://developers.cloudflare.com/workers/wrangler/configuration/
#
# ARQUITETURA v3:
# O Worker é o MOTOR PRINCIPAL de disparo.
# Crons do Cloudflare são precisos ao minuto (SLA de infra).
# GitHub Actions schedules podem atrasar 5–30 min — usados apenas como backup.

name               = "gti-dashboard-robo"
main               = "worker.js"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

# ── Cron Triggers ────────────────────────────────────────────────────────────
# Limite do plano free: 5 crons por Worker
# META: Dashboard pronto até 07:00 BRT → primeira tentativa às 05:00 BRT
#
# UTC→BRT: UTC-3
#   08 UTC = 05:00 BRT  ← 1ª tentativa (disparo madrugada — antes de qualquer reunião)
#   09 UTC = 06:00 BRT  ← 2ª tentativa (reforço matinal)
#   10 UTC = 07:00 BRT  ← 3ª tentativa (deadline — deve já estar pronto)
#   12 UTC = 09:00 BRT  ← 4ª tentativa (fallback manhã)
#   14 UTC = 11:00 BRT  ← 5ª tentativa (watchdog tarde — último recurso)
[triggers]
crons = [
  "0 8 * * *",    # 05:00 BRT — 1ª tentativa (madrugada — garante dado fresco)
  "0 9 * * *",    # 06:00 BRT — 2ª tentativa (reforço matinal)
  "0 10 * * *",   # 07:00 BRT — 3ª tentativa (deadline máximo acordado)
  "0 12 * * *",   # 09:00 BRT — 4ª tentativa (fallback manhã)
  "0 14 * * *",   # 11:00 BRT — 5ª tentativa (watchdog tarde)
]

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true

# ── Variáveis de Ambiente (não-secretas) ─────────────────────────────────────
[vars]
GITHUB_REPO = "nilzonspinola-lang/gti-dashboard"

# ── Secrets necessários ───────────────────────────────────────────────────────
# Configurar via deploy-worker.yml (GitHub Secret → Cloudflare Worker Secret)
# OU manualmente: Workers → gti-dashboard-robo → Settings → Variables & Secrets
#
#   GITHUB_PAT       ← PAT com permissão actions:write  ← OBRIGATÓRIO (motor)
#                      Criar em: github.com/settings/tokens
#                      Scopes: repo + workflow
#                      GitHub Secret name: WORKER_GITHUB_PAT
#
#   RESEND_API_KEY   ← Chave da API Resend (para alertas por e-mail)
#   ALERT_EMAIL_TO   ← E-mail destino dos alertas
