# wrangler.toml — GTI Dashboard Robô (Cloudflare Worker)
# Documentação: https://developers.cloudflare.com/workers/wrangler/configuration/

name               = "gti-dashboard-robo"
main               = "worker.js"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

# ── Cron Triggers ────────────────────────────────────────────────────────────
# Fiscaliza a cada hora entre 10:00 e 16:00 UTC (07:00–13:00 Brasília)
# Garante cobertura total mesmo se o GitHub Actions atrasar.
[triggers]
crons = [
  "0 10 * * *",   # 07:00 Brasília
  "0 12 * * *",   # 09:00 Brasília
  "0 13 * * *",   # 10:00 Brasília
  "0 15 * * *",   # 12:00 Brasília
  "0 16 * * *",   # 13:00 Brasília
]

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true

# ── Variáveis de Ambiente (não-secretas) ─────────────────────────────────────
# Valores sensíveis são configurados via `wrangler secret put` ou pelo
# Cloudflare Dashboard → Workers → Settings → Variables & Secrets
[vars]
GITHUB_REPO   = "nilzonspinola-lang/gti-dashboard"
WORKFLOW_ID   = "daily-update.yml"
DATA_JSON_URL = "https://raw.githubusercontent.com/nilzonspinola-lang/gti-dashboard/main/data.json"

# ── Secrets necessários (configurar separadamente) ────────────────────────────
# Execute um a um após `wrangler login`:
#   wrangler secret put GITHUB_TOKEN     ← PAT com permissões repo + workflow
#   wrangler secret put RESEND_API_KEY   ← Chave Resend (e-mail gratuito)
#   wrangler secret put ALERT_EMAIL_TO   ← E-mail destino dos alertas
