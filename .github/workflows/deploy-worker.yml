name: GTI Worker — Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de deploy'
        required: false
        default: 'production'
        type: choice
        options: [production]

permissions:
  contents: read

concurrency:
  group: cloudflare-worker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: "🚀 Deploy Worker → Cloudflare"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      # ── 1. Validar CLOUDFLARE_API_TOKEN ───────────────────────────────────
      - name: 🔑 Validar CLOUDFLARE_API_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "🔍 Validando CLOUDFLARE_API_TOKEN..."
          BODY=$(curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "📡 HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            STATUS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('status','unknown'))" 2>/dev/null)
            echo "✅ Token válido — status: $STATUS"
          elif [ "$HTTP_CODE" = "401" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN inválido (HTTP 401) — atualize o secret."
            exit 1
          else
            echo "⚠️  HTTP $HTTP_CODE — prosseguindo."
          fi

      # ── 2. Verificar arquivos ──────────────────────────────────────────────
      - name: 📁 Verificar arquivos do Worker
        run: |
          ls -la cloudflare-worker/
          test -f cloudflare-worker/worker.js     || (echo "❌ worker.js não encontrado!"     && exit 1)
          test -f cloudflare-worker/wrangler.toml || (echo "❌ wrangler.toml não encontrado!" && exit 1)
          echo "✅ Arquivos OK"

      # ── 3. Deploy via Wrangler CLI direto (sem action — evita bug de assets dir) ──
      - name: 🚀 Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@4 --silent 2>&1 | tail -3
          # Deploy from cloudflare-worker/ subdir with explicit config path
          # Wrangler v4 + working from the subdir avoids root-level assets auto-detection
          cd cloudflare-worker
          wrangler deploy --config wrangler.toml

      # ── 4. Injetar GITHUB_PAT no Worker (motor v3) ────────────────────────
      # OBRIGATÓRIO: permite ao Worker disparar daily-update.yml via GitHub API
      - name: 🔑 Injetar GITHUB_PAT no Worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_GITHUB_PAT:     ${{ secrets.WORKER_GITHUB_PAT }}
        run: |
          if [ -z "$WORKER_GITHUB_PAT" ]; then
            echo "❌ WORKER_GITHUB_PAT não configurado — Worker não poderá disparar workflows!"
            exit 1
          fi
          echo "🔑 Injetando GITHUB_PAT no Worker..."
          HTTP_CODE=$(curl -s -o /tmp/pat_resp.json -w "%{http_code}" \
            -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/gti-dashboard-robo/secrets" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"GITHUB_PAT\",\"text\":\"${WORKER_GITHUB_PAT}\",\"type\":\"secret_text\"}")
          echo "📡 HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ GITHUB_PAT injetado com sucesso."
          else
            echo "❌ Falha ao injetar GITHUB_PAT (HTTP $HTTP_CODE):"
            cat /tmp/pat_resp.json
            exit 1
          fi

      # ── 5. Limpar secret obsoleto ──────────────────────────────────────────
      - name: 🗑️ Remover secret GITHUB_TOKEN obsoleto do Worker
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/del_resp.json -w "%{http_code}" \
            -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/gti-dashboard-robo/secrets/GITHUB_TOKEN" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")
          if [ "$HTTP_CODE" = "200" ]; then echo "🗑️ GITHUB_TOKEN removido."
          elif [ "$HTTP_CODE" = "404" ]; then echo "ℹ️  GITHUB_TOKEN já não existe."
          else echo "⚠️  HTTP $HTTP_CODE (não crítico)."; fi

      # ── 6. Smoke test ──────────────────────────────────────────────────────
      - name: 🔍 Smoke test — Worker online
        run: |
          echo "⏳ Aguardando propagação (15s)..."
          sleep 15
          WORKER_URL="https://gti-dashboard-robo.nilzon-spinola.workers.dev/status"
          HTTP_CODE=$(curl -s -o /tmp/worker_resp.json -w "%{http_code}" --max-time 15 "$WORKER_URL" || echo "000")
          echo "📡 HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Worker online."
            python3 -c "import json; d=json.load(open('/tmp/worker_resp.json')); print('   dashboard:', d.get('dashboard')); print('   githubPat:', d.get('githubPat')); print('   ultimaData:', d.get('ultimaData'))" 2>/dev/null || true
          else
            echo "⚠️  Worker HTTP $HTTP_CODE — verificar manualmente."
            exit 1
          fi

      # ── 7. Relatório ───────────────────────────────────────────────────────
      - name: 📋 Relatório de deploy
        if: always()
        run: |
          echo "=================================================="
          echo "  🚀 DEPLOY CLOUDFLARE WORKER v3 — RELATÓRIO"
          echo "  Repo    : ${{ github.repository }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Hora    : $(TZ=America/Sao_Paulo date +'%d/%m/%Y às %H:%M:%S')"
          echo "  Worker  : https://gti-dashboard-robo.nilzon-spinola.workers.dev"
          echo "=================================================="
