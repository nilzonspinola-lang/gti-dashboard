name: GTI Dashboard - Atualização Diária

# ══════════════════════════════════════════════════════════════════════════════
# CAMADA 1 — Workflow principal de atualização
# META: Dashboard pronto até 07:00 BRT (deadline acordado).
#
# MOTOR PRINCIPAL: Cloudflare Worker crons (precisos ao minuto)
#   disparam este workflow via GitHub API às 05h/06h/07h/09h/11h BRT.
#
# BACKUP: GitHub Actions schedules abaixo — podem atrasar 5–30 min
#   mas garantem cobertura mesmo se o Worker falhar.
#
# IDEMPOTENTE: se já atualizado hoje, pula silenciosamente (exceto force=true).
# ══════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    # Backup schedules (GitHub Actions — não-determinístico, pode atrasar)
    # Espelham os crons do Worker para garantir cobertura dupla
    - cron: '0 8 * * *'    # 05:00 BRT — backup do 1º cron do Worker
    - cron: '0 9 * * *'    # 06:00 BRT — backup do 2º cron do Worker
    - cron: '0 10 * * *'   # 07:00 BRT — deadline máximo
    - cron: '0 12 * * *'   # 09:00 BRT — fallback manhã
    - cron: '0 14 * * *'   # 11:00 BRT — última tentativa do turno
  workflow_dispatch:
    inputs:
      force:
        description: 'Forçar atualização mesmo se já rodou hoje'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths:
      - 'scripts/update-dashboard.js'
      - '.github/force-update.txt'

permissions:
  contents: write
  actions: write

concurrency:
  group: gti-dashboard-update
  cancel-in-progress: false   # nunca cancela — fila, não descarta

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── PASSO 0: Keep-alive ─────────────────────────────────────────────────
      # SEMPRE roda, independente do resultado dos passos seguintes.
      # Garante commit diário para evitar suspensão de schedules pelo GitHub.
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: 🔄 Keep-alive — commit diário para evitar suspensão de schedules
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "$(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M:%S')" > .github/keep-alive.txt
          git add .github/keep-alive.txt
          git commit --allow-empty -m "chore: keep-alive $(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && echo "✅ Keep-alive commitado." && break
            echo "⚠️ Push falhou (tentativa $i/3) — aguardando 5s..."
            sleep 5
          done

      # ── PASSO 1: Verificar se já rodou hoje ─────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: 🔍 Verificar se já foi atualizado hoje
        id: check
        run: |
          TODAY=$(TZ=America/Sao_Paulo date +'%d/%m/%Y')
          FORCE="${{ github.event.inputs.force }}"

          LAST=$(node -e "
            const fs = require('fs');
            try {
              const d = JSON.parse(fs.readFileSync('data.json','utf8'));
              console.log((d.data_coleta || '').substring(0,10));
            } catch(e) { console.log(''); }
          ")

          echo "Hoje BRT: $TODAY | Última atualização: $LAST | Force: $FORCE"

          if [ "$LAST" = "$TODAY" ] && [ "$FORCE" != "true" ]; then
            echo "ja_atualizado=true"  >> $GITHUB_OUTPUT
            echo "✅ Já atualizado hoje ($TODAY) — pulando."
          else
            echo "ja_atualizado=false" >> $GITHUB_OUTPUT
            echo "🔄 Iniciando atualização (last=$LAST, hoje=$TODAY, force=$FORCE)."
          fi

      # ── PASSO 2: Validar credenciais Controlle antes de tentar ─────────────
      # Detecta falha de credencial ANTES de gastar as 3 tentativas.
      # O login Controlle usa email+password (REST API) — não usa refresh token.
      # CONTROLLE_REFRESH_TOKEN é secret legado — não usado por este script.
      - name: 🔑 Validar credenciais Controlle
        if: steps.check.outputs.ja_atualizado == 'false'
        env:
          CONTROLLE_EMAIL:    ${{ secrets.CONTROLLE_EMAIL }}
          CONTROLLE_PASSWORD: ${{ secrets.CONTROLLE_PASSWORD }}
        run: |
          if [ -z "$CONTROLLE_EMAIL" ] || [ -z "$CONTROLLE_PASSWORD" ]; then
            echo "❌ FATAL: CONTROLLE_EMAIL ou CONTROLLE_PASSWORD não configurados!"
            echo "🔧 Acesse: github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "🔍 Testando login no Controlle Gateway..."
          HTTP_CODE=$(curl -s -o /tmp/login_resp.json -w "%{http_code}" \
            --max-time 15 \
            -X POST "https://controlle-gateway-prod.controlle.com/company/login" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GTI-Dashboard-Robot/3.0" \
            --data "{\"email\":\"${CONTROLLE_EMAIL}\",\"password\":\"${CONTROLLE_PASSWORD}\"}")
          echo "📡 Login HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Credenciais válidas — login OK."
          elif [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "❌ CREDENCIAIS INVÁLIDAS (HTTP $HTTP_CODE)!"
            echo "🔧 Atualize CONTROLLE_EMAIL e/ou CONTROLLE_PASSWORD nos GitHub Secrets."
            echo "🔗 https://github.com/${{ github.repository }}/settings/secrets/actions"
            cat /tmp/login_resp.json 2>/dev/null | head -c 200 || true
            exit 1
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "⚠️ Timeout/sem conexão com Controlle Gateway — prosseguindo mesmo assim."
          else
            echo "⚠️ HTTP $HTTP_CODE inesperado — prosseguindo (pode ser falso negativo)."
          fi

      # ── PASSO 3: Instalar dependências ──────────────────────────────────────
      - name: 📦 Instalar dependências
        if: steps.check.outputs.ja_atualizado == 'false'
        working-directory: scripts
        run: npm ci --prefer-offline 2>/dev/null || npm install

      # ── PASSO 4: Rodar atualização (3 tentativas com backoff exponencial) ───
      - name: 🚀 Atualizar dashboard (3 tentativas)
        if: steps.check.outputs.ja_atualizado == 'false'
        id: run_update
        working-directory: scripts
        env:
          CONTROLLE_EMAIL:    ${{ secrets.CONTROLLE_EMAIL }}
          CONTROLLE_PASSWORD: ${{ secrets.CONTROLLE_PASSWORD }}
          TZ: America/Sao_Paulo
        run: |
          SUCCESS=false
          for i in 1 2 3; do
            echo "━━━ Tentativa $i/3 ━━━"
            if node update-dashboard.js; then
              echo "✅ Sucesso na tentativa $i."
              echo "success=true" >> $GITHUB_OUTPUT
              SUCCESS=true
              break
            else
              EXIT_CODE=$?
              echo "⚠️ Tentativa $i falhou (exit $EXIT_CODE)."
              if [ $i -lt 3 ]; then
                WAIT=$((i * 30))
                echo "⏳ Aguardando ${WAIT}s antes da próxima tentativa..."
                sleep $WAIT
              fi
            fi
          done
          if [ "$SUCCESS" != "true" ]; then
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Todas as 3 tentativas falharam."
            exit 1
          fi

      # ── PASSO 5: Commit e push dos dados atualizados ─────────────────────────
      - name: 💾 Commit e push dos dados atualizados
        if: steps.check.outputs.ja_atualizado == 'false' && steps.run_update.outputs.success == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          if git diff --staged --quiet; then
            echo "ℹ️ Nenhuma mudança detectada — pulando commit."
            exit 0
          fi
          git commit -m "chore: atualiza saldos+dre+timestamp $(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && echo "✅ Dashboard atualizado e publicado." && break
            echo "⚠️ Push falhou (tentativa $i/3) — aguardando 5s..."
            sleep 5
          done

      # ── PASSO 6: Relatório de falha ──────────────────────────────────────────
      # O Worker Cloudflare é o motor de retry — no próximo cron (máx 2h) vai
      # detectar o dashboard desatualizado e redisparar automaticamente.
      # O watchdog.yml fiscaliza às 09h/11h/13h BRT como última linha de defesa.
      - name: 📋 Relatório de falha
        if: failure() && steps.check.outputs.ja_atualizado == 'false'
        run: |
          echo "❌ Atualização falhou em $(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M BRT')"
          echo "ℹ️  Próxima tentativa: Worker Cloudflare no próximo cron"
          echo "ℹ️  Watchdog fiscaliza às 09h/11h/13h BRT"
          echo "🔗 Logs: https://github.com/${{ github.repository }}/actions"
