name: GTI Dashboard - Atualização Diária

on:
  schedule:
    # 07:00 Brasília (UTC-3) = 10:00 UTC. Roda todo dia.
    - cron: '0 10 * * *'
  workflow_dispatch: {}  # permite disparo manual pela aba Actions
  push:
    branches: [main]
    paths:
      - 'scripts/update-dashboard.js'

permissions:
  contents: write  # necessário para commit/push do index.html e data.json

concurrency:
  group: gti-dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run dashboard update (via API REST)
        working-directory: scripts
        env:
          CONTROLLE_EMAIL:    ${{ secrets.CONTROLLE_EMAIL }}
          CONTROLLE_PASSWORD: ${{ secrets.CONTROLLE_PASSWORD }}
          TZ: America/Sao_Paulo
        run: node update-dashboard.js

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança detectada — pulando commit."
            exit 0
          fi
          git commit -m "chore: atualiza saldos+dre+timestamp $(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M')"
          git push
