name: Atualiza GTI Dashboard

on:
  schedule:
    - cron: '0 10 * * *'   # 07:00 BRT (Brasília = UTC-3) todos os dias
  workflow_dispatch:        # permite rodar manualmente pelo GitHub a qualquer momento

jobs:
  atualiza:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instala dependências
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Atualiza saldos
        env:
          CONTROLLE_EMAIL: ${{ secrets.CONTROLLE_EMAIL }}
          CONTROLLE_PASSWORD: ${{ secrets.CONTROLLE_PASSWORD }}
        run: node update-dashboard.js

      - name: Commit e push
        run: |
          git config user.name  "GTI Dashboard Bot"
          git config user.email "nilzon.spinola@gti-g.com"
          git add data.json index.html
          git diff --staged --quiet && echo "Nenhuma alteração." || \
          git commit -m "chore: atualiza saldos+timestamp $(TZ='America/Sao_Paulo' date +'%d/%m/%Y às %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
