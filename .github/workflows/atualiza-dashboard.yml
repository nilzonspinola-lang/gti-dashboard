name: Atualiza GTI Dashboard

on:
  schedule:
    # 07:52 BRT = 10:52 UTC (BRT = UTC-3)
    - cron: '52 10 * * *'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      secrets: write  # permite atualizar secrets via gh CLI

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install socket.io-client

      - name: Executar script de atualização
        id: update
        env:
          CONTROLLE_REFRESH_TOKEN: ${{ secrets.CONTROLLE_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-dashboard.mjs

      - name: Auto-renovar refreshToken se necessário
        if: steps.update.outputs.novo_refresh_token != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TOKEN="${{ steps.update.outputs.novo_refresh_token }}"
          if [ -n "$NEW_TOKEN" ]; then
            echo "$NEW_TOKEN" | gh secret set CONTROLLE_REFRESH_TOKEN --repo ${{ github.repository }}
            echo "✅ CONTROLLE_REFRESH_TOKEN renovado automaticamente! Token válido por mais 7 dias."
          fi
