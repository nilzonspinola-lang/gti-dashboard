name: Atualiza GTI Dashboard

on:
  schedule:
    - cron: '52 10 * * *'
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install socket.io-client
      - run: node scripts/update-dashboard.mjs
        env:
          CONTROLLE_REFRESH_TOKEN: ${{ secrets.CONTROLLE_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
