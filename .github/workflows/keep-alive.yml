name: GTI Dashboard - Keep Alive 🔄

# Propósito: backup do keep-alive embutido no daily-update.yml
# Roda às 03:00 BRT — ANTES de todos os outros workflows
# O keep-alive principal está embutido no daily-update.yml (roda em TODOS os casos)
# Este é uma camada extra de segurança.

on:
  schedule:
    - cron: '0 6 * * *'   # 03:00 BRT
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '.github/workflows/keep-alive.yml'   # roda ao salvar este arquivo

permissions:
  contents: write

jobs:
  keep-alive:
    name: "🔄 Keep Alive"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 📝 Commit de keep-alive
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "$(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M:%S')" > .github/keep-alive.txt
          git add .github/keep-alive.txt
          git commit --allow-empty -m "chore: keep-alive $(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M')"
          git push
          echo "✅ Keep-alive executado."
