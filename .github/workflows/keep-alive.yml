name: GTI Dashboard - Keep Alive 🔄

# ══════════════════════════════════════════════════════════════════════════════
# CAMADA 0 — Keep-alive independente
# Roda às 02:00 UTC (23:00 BRT) — 3 horas ANTES do 1º cron do Worker (05:00 BRT).
# Garante commit diário para evitar suspensão de schedules pelo GitHub.
# O keep-alive também está embutido no daily-update.yml como redundância.
# ══════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 2 * * *'    # 23:00 BRT (dia anterior) — 3h antes do 1º cron
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - '.github/workflows/keep-alive.yml'   # roda ao salvar este arquivo

permissions:
  contents: write

jobs:
  keep-alive:
    name: "🔄 Keep Alive"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: 📝 Commit de keep-alive
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "$(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M:%S')" > .github/keep-alive.txt
          git add .github/keep-alive.txt
          git commit --allow-empty -m "chore: keep-alive $(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && echo "✅ Keep-alive executado — schedules mantidos ativos." && break
            echo "⚠️ Push falhou (tentativa $i/3) — aguardando 5s..."
            sleep 5
          done
